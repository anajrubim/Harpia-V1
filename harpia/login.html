<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Harpia</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .login-header {
      background: var(--grad-header);
      padding: 48px 28px 60px;
      position: relative;
      overflow: hidden;
      text-align: center;
    }
    .login-header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 28px;
      background: var(--bg);
      border-radius: 28px 28px 0 0;
    }
    .login-header::before {
      content: '';
      position: absolute;
      top: -50px; right: -50px;
      width: 200px; height: 200px;
      background: rgba(242,84,27,.15);
      border-radius: 50%;
    }
    .login-logo {
      width: 80px; height: 80px;
      object-fit: contain;
      margin-bottom: 12px;
      position: relative;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,.3));
    }
    .login-header h1 {
      font-size: 26px;
      font-weight: 800;
      color: var(--branco);
      position: relative;
      letter-spacing: -.5px;
    }
    .login-header p {
      font-size: 13px;
      color: rgba(255,255,255,.7);
      position: relative;
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="app">

  <div class="login-header">
    <img src="assets/logo-harpia.png" class="login-logo" alt="Harpia">
    <h1>Bem-vindo!</h1>
    <p>Acesse sua conta para continuar</p>
  </div>

  <div class="container">
    <div class="card">
      <div class="center">
        <h2>Entrar na conta</h2>
        <p>Digite seu número para receber o código</p>
      </div>

      <input type="tel" placeholder="(11) 91234-5678">

      <a href="otp.html" class="btn">
        <i class="fa-solid fa-paper-plane"></i> Receber código
      </a>
    </div>
  </div>

</div>
</body>
</html>
