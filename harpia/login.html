<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Harpia</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="app">

  <div class="login-header">
    <img src="assets/logo-harpia.jpeg" class="login-logo" alt="Harpia">
    <h1>Bem-vindo!</h1>
    <p>Acesse sua conta para continuar</p>
  </div>

  <div class="container">
    <div class="card">
      <div class="center">
        <h2>Entrar na conta</h2>
        <p>Digite seu número para receber o código</p>
      </div>

      <input type="tel" placeholder="(11) 91234-5678">

      <a href="otp.html" class="btn">
        <i class="fa-solid fa-paper-plane"></i> Receber código
      </a>
    </div>
  </div>

</div>
</body>
</html>
