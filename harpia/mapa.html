<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mapa</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>
<div class="app">

  <div class="map-header">
    <a href="home.html" class="back">
        <i class="fa-solid fa-arrow-left"></i>
    </a>
    <h3>Rastreamento</h3>
  </div>

  <div id="map"></div>

  <div class="map-card">
    <h4>🚌 Linha 305 - Centro</h4>
    <p>Chegando em ~8 min</p>

    <div class="status ok">Em rota</div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([-23.10, -45.70], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  var busIcon = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',
    iconSize: [35, 35]
  });

  var bus = L.marker([-23.10, -45.70], {icon: busIcon}).addTo(map);
  var lat = -23.10;
  var lng = -45.70;

  setInterval(() => {
    lat += 0.0005;
    lng += 0.0005;

    bus.setLatLng([lat, lng]);
    map.panTo([lat, lng]);

  }, 2000);
</script>

</body>
</html>
